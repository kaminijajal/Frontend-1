<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="web.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

</head>

<body>
  <!-- =======Navbar=========== -->
  <header>
    <div class="logo">
      <i class="fa-solid fa-bed"></i>
      <p>LOGO</p>
    </div>

    <ul>
      <li><a href="#">Rooms</a></li>
      <li><a href="#">About</a></li>
      <li><a href="#">Contact</a></li>
      <li><a href="#">Book Now</a></li>
    </ul>
  </header>
  <main>
    <div class="hero-div">
      <img src="img/pexels-ahmetcotur-28054875.jpg" alt="">
      <div class="hero-text">
        <div class="form-div">
          <div class="form-header">
            <i class="fa-solid fa-bed"></i>
            <h3>Hotel Name</h3>
          </div>
          <div class="form-main">
            <div class="m-first">
              <div class="m-f-left">
                <div class="type">
                  <i class="fa-regular fa-calendar"></i>
                  <p>Check In</p>
                </div>
                <input type="text" name="" id="" placeholder="DD MM YYYY">
              </div>
              <div class="m-r-left">
                <div class="type">
                  <i class="fa-regular fa-calendar"></i>
                  <p>Check Out</p>
                </div>
                <input type="text" name="" id="" placeholder="DD MM YYYY">
              </div>
            </div>
            <div class="m-sec">
              <div class="m-f-left">
                <div class="type">
                  <i class="fa-solid fa-person"></i>
                  <p>Adults</p>
                </div>
                <input type="number">
              </div>
              <div class="m-r-left">
                <div class="type">
                  <i class="fa-solid fa-child"></i>
                <p>Kids</p>
                </div>
                <input type="number">
              </div>
            </div>
            <div class="btn">
            <button class="btn1" type="button">
                  <i class="fa-solid fa-magnifying-glass"></i>
                   Search availability
            </button>
          </div>
          </div>
          
        </div>
      </div>
    </div>
  </main>
</body>

</html>
