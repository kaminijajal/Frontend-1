<!DOCTYPE html>
<html>
<head>
    <title>Wishlist with Clear Button</title>
</head>
<body>

    <h2>My Wishlist</h2>

    <button onclick="clearWishlist()">Clear Wishlist</button>

    <ul id="wishlist"></ul>

    <script>
        // Sample wishlist
        const products = [
            { name: "Samsung Galaxy S24", price: 74999 },
            { name: "Nike Sneakers", price: 4999 },
            { name: "Boat Headphones", price: 1999 }
        ];

        // Save wishlist only if it doesn't exist
        if (!localStorage.getItem("wishlist")) {
            localStorage.setItem("wishlist", JSON.stringify(products));
        }

        // Function to display wishlist
        function displayWishlist() {
            const list = document.getElementById("wishlist");
            list.innerHTML = "";

            const wishlist = JSON.parse(localStorage.getItem("wishlist")) || [];

            if (wishlist.length === 0) {
                list.innerHTML = "<li>Wishlist is empty.</li>";
                return;
            }

            wishlist.forEach(product => {
                const li = document.createElement("li");
                li.textContent = `${product.name} - ₹${product.price}`;
                list.appendChild(li);
            });
        }

        // Function to clear wishlist
        function clearWishlist() {
            localStorage.removeItem("wishlist");
            displayWishlist(); // Update UI immediately
        }

        // Display wishlist on page load
        displayWishlist();
    </script>

</body>
</html>
