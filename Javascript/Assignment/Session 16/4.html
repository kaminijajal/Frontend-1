<!DOCTYPE html>
<html>
<head>
  <title>Instagram Likes</title>
</head>
<body>

  <h2>Check Console for Output</h2>

  <script>
    const posts = [
      { id: 1, likes: 120 },
      { id: 2, likes: 450 },
      { id: 3, likes: 89 },
      { id: 4, likes: 300 }
    ];

    // Use map to get only like counts
    const likeCounts = posts.map(post => post.likes);

    console.log(likeCounts);
  </script>

</body>
</html>
