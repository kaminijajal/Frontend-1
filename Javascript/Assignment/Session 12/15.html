<!DOCTYPE html>
<html>
<head>
  <title>Filter Albums by UserID</title>
</head>
<body>

<h2>Check Console for Filtered Albums 🎧</h2>

<script>
  fetch('https://jsonplaceholder.typicode.com/albums')
    .then(response => response.json())
    .then(albums => {
      // Filter albums where userId is 2
      const user2Albums = albums.filter(album => album.userId === 2);

      console.log("🎵 Albums of UserID 2:");

      // Display only titles
      user2Albums.forEach(album => {
        console.log(album.title);
      });
    })
    .catch(error => {
      console.log("Error fetching albums:", error);
    });
</script>

</body>
</html>
