<!DOCTYPE html>
<html>
<head>
  <title>Top Movies Fetch Example</title>
</head>
<body>

<h2>Open Console to See Trending Movies 🎬</h2>

<script>
  function fetchTopMovies() {
    fetch('https://jsonplaceholder.typicode.com/albums')
      .then(response => response.json())
      .then(data => {
        const top3 = data.slice(0, 3);

        console.log("🔥 Trending Movies on BookMyShow:");

        top3.forEach(movie => {
          console.log(movie.title);
        });
      })
      .catch(error => {
        console.log("Error fetching movies:", error);
      });
  }

  // Call function when page loads
  fetchTopMovies();
</script>

</body>
</html>
