<script>
    // Primitive Type Example

    let food = "Pizza";
    let foodCopy = food;

    food = "Burger"

    console.log("Food : ",food);
    console.log("FoodCopy : ",foodCopy);

    // Reference Type Example (Object)

    let instagramUser = {
        city : "Rajkot"
    };
    let anotherUser = instagramUser;

    instagramUser.city = "Surat"

    console.log("InstagramUser : ",instagramUser);
    console.log("AnotherUSer : ",anotherUser);
    
    
    
    
</script>
