<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Instagram Like Button</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #f5f5f5;
    }

    .card {
      text-align: center;
      background: #fff;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
    }

    button {
      padding: 10px 20px;
      font-size: 18px;
      cursor: pointer;
      border: none;
      border-radius: 5px;
      background: #e1306c;
      color: white;
    }

    p {
      font-size: 18px;
      margin-top: 15px;
    }
  </style>
</head>
<body>

  <div class="card">
    <h2>Instagram Post</h2>

    <button id="likeBtn">❤️ Like</button>

    <p>Likes: <span id="likeCount">0</span></p>
  </div>

  <script>
    let count = 0;

    const likeBtn = document.getElementById("likeBtn");
    const likeCount = document.getElementById("likeCount");

    likeBtn.addEventListener("click", function () {
      count++;
      likeCount.textContent = count;
    });
  </script>

</body>
</html>
