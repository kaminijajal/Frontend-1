<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Random Song Card</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin-top: 40px;
      background: #f4f4f4;
    }

    button {
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
    }

    #songs {
      margin-top: 20px;
    }

    .card {
      width: 250px;
      margin: 10px auto;
      padding: 15px;
      background: white;
      border-radius: 8px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.2);
      font-size: 18px;
    }
  </style>
</head>
<body>

  <h2>My Playlist</h2>

  <button onclick="addSong()">Add Song</button>

  <div id="songs"></div>

  <script>
    const playlist = [
      "Shape of You",
      "Blinding Lights",
      "Perfect",
      "Believer",
      "Levitating",
      "Closer",
      "Senorita",
      "Heat Waves"
    ];

    function addSong() {
      const randomSong = playlist[Math.floor(Math.random() * playlist.length)];

      const card = document.createElement("div");
      card.className = "card";
      card.innerHTML = "<h3>" + randomSong + "</h3>";

      document.getElementById("songs").appendChild(card);
    }
  </script>

</body>
</html>
