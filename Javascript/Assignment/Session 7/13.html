<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flipkart Add to Cart</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin-top: 50px;
      background: #f1f3f6;
    }

    button {
      background-color: #2874f0;
      color: white;
      border: none;
      padding: 12px 25px;
      font-size: 18px;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background-color: #1f5fc4;
    }
  </style>
</head>
<body>

  <h2>Flipkart Product</h2>

  <button id="cartBtn">🛒 Add to Cart</button>

  <script>
    const cartBtn = document.getElementById("cartBtn");

    function handleMouseEvent(event) {
      console.log("Event Type:", event.type);
      console.log("X Coordinate:", event.clientX);
      console.log("Y Coordinate:", event.clientY);
      console.log("----------------------");
    }

    // Listen for different mouse events
    cartBtn.addEventListener("click", handleMouseEvent);
    cartBtn.addEventListener("mouseover", handleMouseEvent);
    cartBtn.addEventListener("mouseout", handleMouseEvent);
  </script>

</body>
</html>
