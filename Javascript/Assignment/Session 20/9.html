<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Followers System</title>
  <style>
    body {
      font-family: Arial;
      display: flex;
      justify-content: center;
      padding-top: 50px;
      background: #f5f5f5;
    }

    .box {
      background: white;
      padding: 20px;
      width: 300px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    input {
      width: 100%;
      padding: 8px;
      margin-top: 5px;
    }

    button {
      width: 100%;
      margin-top: 10px;
      padding: 8px;
      cursor: pointer;
    }

    .error {
      color: red;
      font-size: 12px;
      margin-top: 5px;
    }

    ul {
      margin-top: 15px;
      padding-left: 20px;
    }
  </style>
</head>
<body>

<div class="box">
  <h2>Add Follower</h2>

  <input type="text" id="name" placeholder="Enter name" />
  <div id="error" class="error"></div>

  <button onclick="addFollower()">Add</button>

  <h3>Followers</h3>
  <ul id="list"></ul>
</div>

<script>
  let followers = [];

  function addFollower() {
    const input = document.getElementById("name");
    const name = input.value;

    const error = document.getElementById("error");

    // ✅ FIX: validation check
    if (name && name.trim() !== "") {
      followers.push(name.trim());
      error.textContent = "";
      input.value = "";
      renderList();
    } else {
      error.textContent = "Please enter a valid name";
    }
  }

  function renderList() {
    const list = document.getElementById("list");
    list.innerHTML = "";

    followers.forEach((follower) => {
      const li = document.createElement("li");
      li.textContent = follower;
      list.appendChild(li);
    });
  }
</script>

</body>
</html>
