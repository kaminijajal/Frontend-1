<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Simple Review Form</title>
</head>
<body>

    <h2>Review Form (The Gourmet Kitchen)</h2>

    <form id="reviewForm" onsubmit="handleFormSubmit(event)">
        <p>
            <label>Rating (1 to 5):</label>
            <input type="number" id="rating" min="1" max="5" required>
            <small style="color: gray;"> (Values above 5 or below 1 are restricted)</small>
        </p>

        <p>
            <label>Your Review:</label><br>
            <textarea id="reviewText" rows="4" cols="40" placeholder="Write your review here..." required></textarea>
        </p>

        <button type="submit">Submit Review</button>
    </form>

    <h3 style="margin-top: 30px;">System Output Log:</h3>
    <div id="output" style="background: #eee; padding: 10px; font-family: monospace; white-space: pre;">
        [No data submitted yet]
    </div>

    <script>
        function handleFormSubmit(event) {
            event.preventDefault(); // Prevents page reload

            const ratingInput = document.getElementById('rating').value;
            const reviewInput = document.getElementById('reviewText').value;
            const outputDiv = document.getElementById('output');

            // --- BUG FIXES (Validation Logic) ---
            
            // Fix 1: Stop submission if the rating bypasses standard constraints
            const rating = parseInt(ratingInput);
            if (rating < 1 || rating > 5) {
                outputDiv.innerHTML = "❌ Error: Rating must be an integer between 1 and 5.";
                outputDiv.style.color = "red";
                return;
            }

            // Fix 2: Stop submission if the text field contains only blank spaces (.trim() removes whitespace)
            if (reviewInput.trim() === "") {
                outputDiv.innerHTML = "❌ Error: Review content cannot be empty or filled with spaces only.";
                outputDiv.style.color = "red";
                return;
            }

            // Standard Output Delivery if Payload is Valid
            const payload = {
                rating: rating,
                reviewText: reviewInput.trim(),
                status: "Success: Review Submitted! ✅"
            };

            outputDiv.innerHTML = JSON.stringify(payload, null, 2);
            outputDiv.style.color = "green";
        }
    </script>

</body>
</html>
