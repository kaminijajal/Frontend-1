<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Followers Summary</title>
</head>
<body>
  <h2>Followers Summary</h2>
  <button onclick="showFollowers()">Show Total Followers</button>

  <script>
    // Arrow function with rest operator
    const getFollowersSummary = (...followers) => {
      let total = 0;

      for (let count of followers) {
        total += count;
      }

      return `Total followers: ${total}`;
    };

    function showFollowers() {
      const result = getFollowersSummary(300, 450, 450);

      console.log(result);
      alert(result);
    }
  </script>
</body>
</html>
