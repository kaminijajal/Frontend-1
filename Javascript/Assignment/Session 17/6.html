<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Flipkart Cart - Event Bubbling</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
    }

    h2 {
      margin-bottom: 15px;
    }

    .cart {
      display: flex;
      flex-direction: column;
      gap: 12px;
      max-width: 500px;
    }

    .card {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      background: #f9f9f9;
    }

    .info {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .name {
      font-weight: bold;
    }

    .price {
      color: green;
    }

    .remove {
      cursor: pointer;
      font-size: 18px;
      font-weight: bold;
      color: red;
      padding: 4px 8px;
      border-radius: 4px;
      user-select: none;
    }

    .remove:hover {
      background: #ffe5e5;
    }

    .add-btn {
      margin-bottom: 15px;
      padding: 10px 14px;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <h2>My Shopping Cart</h2>

  <button class="add-btn" id="addBtn">Add Product</button>

  <div class="cart" id="cart">

    <div class="card">
      <div class="info">
        <div class="name">iPhone 15</div>
        <div class="price">₹79,999</div>
      </div>
      <div class="remove">X</div>
    </div>

    <div class="card">
      <div class="info">
        <div class="name">Samsung Buds</div>
        <div class="price">₹4,999</div>
      </div>
      <div class="remove">X</div>
    </div>

  </div>

  <script>
    const cart = document.getElementById("cart");
    const addBtn = document.getElementById("addBtn");

    let count = 1;

    // Add new product dynamically
    addBtn.addEventListener("click", () => {
      const card = document.createElement("div");
      card.classList.add("card");

      card.innerHTML = `
        <div class="info">
          <div class="name">New Product ${count}</div>
          <div class="price">₹${1000 + count * 500}</div>
        </div>
        <div class="remove">X</div>
      `;

      cart.appendChild(card);
      count++;
    });

    // Event bubbling / delegation
    cart.addEventListener("click", (event) => {
      if (event.target.classList.contains("remove")) {
        const card = event.target.closest(".card");
        card.remove();
      }
    });
  </script>

</body>
</html>
