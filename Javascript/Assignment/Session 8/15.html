<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let favApps = [
            {
                title:"ChatGPT",
                url :"https://chatgpt.com"
            },
            {
                title:"YouTube",
                url:"https://www.youtube.com"
            },
            {
                title:"Instagram",
                url:"https://www.instagram.com"
            },
            {
                title:"JioSaavn",
                url:"https://www.jiosaavn.com"
            },
            { 
                title:"Google Chrome",
                url:"https://www.google.com/chrome/"
            },
        ];
        
        favApps.splice(2,1,{
            title:"WhatsApp",
            url:"https://www.whatsapp.com"
        });

        let data="";
        for(let favApp of favApps){
            data += favApp.title + "\n" + 
                    favApp.url +"\n" +
                    "--------------------------------\n";
        }
        // console.log(data);
        
        alert(data);
        
    </script>
</body>
</html>
