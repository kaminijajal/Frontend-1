<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Cart Refactor Demo</title>
</head>
<body>

  <h2>Check Console for Cart Output 🛒</h2>

  <script>
    /**************** utils.js (simulated module) ****************/

    // Named export
    function formatPrice(price) {
      return "₹" + price.toFixed(2);
    }

    // Default export
    function getDiscountedPrice(price, discountPercent) {
      return price - (price * discountPercent) / 100;
    }

    /**************** cart.js (simulated module import) ****************/

    // Simulating:
    // import getDiscountedPrice from "./utils.js";
    // import { formatPrice } from "./utils.js";

    const discountFn = getDiscountedPrice; // default import
    const formatFn = formatPrice;          // named import

    // Cart items
    const items = [
      { name: "Shoes", price: 2000, discount: 10 },
      { name: "T-Shirt", price: 800, discount: 20 },
      { name: "Watch", price: 5000, discount: 15 }
    ];

    // Output
    items.forEach(item => {
      const discounted = discountFn(item.price, item.discount);

      console.log("🛒 Item:", item.name);
      console.log("Original Price:", formatFn(item.price));
      console.log("Discounted Price:", formatFn(discounted));
      console.log("----------------------");
    });
  </script>

</body>
</html>
