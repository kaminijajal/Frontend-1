<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Spotify Utils Demo</title>
</head>
<body>

  <h2>Check Console for Spotify Song Details 🎵</h2>

  <script>
    // Capitalize every word in song title
    function formatSongTitle(title) {
      return title
        .split(" ")
        .map(word => word.charAt(0).toUpperCase() + word.slice(1).toLowerCase())
        .join(" ");
    }

    // Convert seconds → mm:ss format
    function getSongDurationInMinutes(seconds) {
      const minutes = Math.floor(seconds / 60);
      const remainingSeconds = seconds % 60;

      const formattedSeconds =
        remainingSeconds < 10 ? "0" + remainingSeconds : remainingSeconds;

      return `${minutes}:${formattedSeconds}`;
    }

    // Sample song data
    const songTitle = "blinding lights";
    const durationInSeconds = 200;

    // Using functions
    const formattedTitle = formatSongTitle(songTitle);
    const formattedDuration = getSongDurationInMinutes(durationInSeconds);

    console.log("🎵 Song Details:");
    console.log("Title:", formattedTitle);
    console.log("Duration:", formattedDuration);
  </script>

</body>
</html>
