<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mood Box</title>
</head>
<body>

    <h2>Type a Color Name</h2>

    <input type="text" id="colorInput" placeholder="Enter color name only" oninput="changeColor()">

    <div id="moodbox" style="width:200px; height:100px; border:1px solid black; margin-top:20px;">
    </div>

    <script>
        function changeColor() {
            let color = document.getElementById("colorInput").value;
            document.getElementById("moodbox").style.backgroundColor = color;
        }
    </script>

</body>
</html>
