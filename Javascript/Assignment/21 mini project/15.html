<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Playlist URL Validation</title>
<style>
    body {
        font-family: Arial, sans-serif;
        margin: 20px;
    }

    input {
        width: 300px;
        padding: 8px;
    }

    button {
        padding: 8px 15px;
        margin-top: 10px;
    }

    #errorMessage {
        color: red;
        font-size: 14px;
        margin-top: 5px;
    }
</style>
</head>
<body>

<h2>Add Playlist Link</h2>

<input
    type="text"
    id="playlistUrl"
    placeholder="https://open.spotify.com/... or https://youtube.com/..."
>
<div id="errorMessage"></div>

<br>
<button onclick="submitPlaylist()">Add Playlist</button>

<script>
    // Validate playlist URL
    function validateLink(url) {
        return (
            url.startsWith("https://") &&
            (url.includes("spotify.com") || url.includes("youtube.com"))
        );
    }

    function submitPlaylist() {
        const url = document.getElementById("playlistUrl").value.trim();
        const errorMessage = document.getElementById("errorMessage");

        if (!validateLink(url)) {
            errorMessage.textContent =
                "Please enter a valid Spotify or YouTube playlist URL starting with 'https://'.";
            return;
        }

        // Clear error if valid
        errorMessage.textContent = "";

        // Continue with your existing add/save logic
        console.log("Valid playlist URL:", url);
    }
</script>

</body>
</html>
