<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Followers Promise Demo</title>
</head>
<body>

  <h2>Check Console for Followers Update</h2>

  <script>
    // Promise that resolves after 1 second with random followers count
    function getFollowersCount() {
      return new Promise((resolve) => {
        setTimeout(() => {
          const followers = Math.floor(Math.random() * 4001) + 1000; // 1000–5000
          resolve(followers);
        }, 1000);
      });
    }

    // Using the Promise
    getFollowersCount()
      .then((count) => {
        console.log(`You have ${count} new followers 📈`);
      });
  </script>

</body>
</html>
