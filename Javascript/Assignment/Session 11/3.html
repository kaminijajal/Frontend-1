<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>setTimeout Example</title>
</head>
<body>

  <h2>Check the console for output</h2>

  <script>
    // Immediately log loading message
    console.log("Loading...");

    // After 2 seconds, log content loaded message
    setTimeout(() => {
      console.log("Content loaded!");
    }, 2000);
  </script>

</body>
</html>
