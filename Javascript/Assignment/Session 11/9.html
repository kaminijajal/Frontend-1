<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Order Status Check</title>
</head>
<body>

  <h2>Check Console for Order Status</h2>

  <script>
    function getOrderStatus(orderId) {
      return new Promise((resolve, reject) => {
        setTimeout(() => {
          if (orderId % 2 === 0) {
            resolve("Order delivered");
          } else {
            reject("Order not found");
          }
        }, 1500);
      });
    }

    // Test case 1 (even → success)
    getOrderStatus(202)
      .then((result) => {
        console.log(result);
      })
      .catch((error) => {
        console.log(error);
      });

    // Test case 2 (odd → failure)
    getOrderStatus(101)
      .then((result) => {
        console.log(result);
      })
      .catch((error) => {
        console.log(error);
      });
  </script>

</body>
</html>
