<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Playlist Example</title>
</head>
<body>

  <h2>Check Console for Playlist Output</h2>

  <script>
    // Define Playlist class
    class Playlist {
      constructor(name, songs) {
        this.name = name;
        this.songs = songs;
      }
    }

    // Create instance
    const chillVibes = new Playlist("Chill Vibes", [
      "Blinding Lights - The Weeknd",
      "Stay - Justin Bieber",
      "Levitating - Dua Lipa"
    ]);

    // Display in console
    console.log(chillVibes);
  </script>

</body>
</html>
