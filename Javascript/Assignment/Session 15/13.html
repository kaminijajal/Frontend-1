<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Flipkart Product Refactor</title>
</head>
<body>

  <h2>Check Console for Product Info</h2>

  <script>
    class FlipkartProduct {
      constructor(title, price, rating) {
        this.title = title;
        this.price = price;
        this.rating = rating;
      }

      // Renamed method
      showProductInfo() {
        console.log(`${this.title} - ₹${this.price} - ${this.rating}⭐`);
      }
    }

    // Create product instance
    const product = new FlipkartProduct("Redmi Note 12 Pro", 18999, 4.5);

    // Updated method call (old displayDetails() replaced)
    product.showProductInfo();
  </script>

</body>
</html>
