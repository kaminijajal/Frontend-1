<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Error Handling Example</title>
</head>
<body>

  <h2>Check Console Output</h2>

  <script>
    let user;

    try {
      console.log(user.name);
    } catch (e) {
      console.log("User data not found");
    }
  </script>

</body>
</html>
