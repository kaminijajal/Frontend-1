<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Playlist Manager</title>

  <style>
    body {
      font-family: Arial;
      background: #111;
      color: white;
      display: flex;
      justify-content: center;
      padding: 30px;
    }

    .app {
      width: 420px;
      background: #1e1e1e;
      padding: 20px;
      border-radius: 10px;
    }

    input, textarea {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border: none;
      border-radius: 6px;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #1db954;
      border: none;
      color: white;
      font-weight: bold;
      border-radius: 6px;
      cursor: pointer;
    }

    button:hover {
      background: #17a64a;
    }

    .playlist {
      margin-top: 10px;
      padding: 10px;
      background: #2a2a2a;
      border-radius: 8px;
    }

    .name {
      color: #1db954;
      font-weight: bold;
    }

    .desc {
      font-size: 13px;
      margin-top: 4px;
      color: #ccc;
    }
  </style>
</head>

<body>

<div class="app">
  <h2>Create Playlist</h2>

  <input type="text" id="name" placeholder="Playlist Name">
  <textarea id="desc" placeholder="Playlist Description"></textarea>

  <button onclick="addPlaylist()">Add Playlist</button>

  <h3>Your Playlists</h3>
  <div id="list"></div>
</div>

<script>
  // Storage array
  let playlists = [];

  function addPlaylist() {
    const name = document.getElementById("name").value.trim();
    const desc = document.getElementById("desc").value.trim();

    if (!name) {
      alert("Playlist name is required!");
      return;
    }

    // Add new playlist object
    playlists.push({
      name: name,
      description: desc
    });

    // Clear form
    document.getElementById("name").value = "";
    document.getElementById("desc").value = "";

    // Update UI
    renderPlaylists();
  }

  function renderPlaylists() {
    const list = document.getElementById("list");
    list.innerHTML = "";

    playlists.forEach((p, index) => {
      list.innerHTML += `
        <div class="playlist">
          <div class="name">${index + 1}. ${p.name}</div>
          <div class="desc">${p.description}</div>
        </div>
      `;
    });
  }
</script>

</body>
</html>
