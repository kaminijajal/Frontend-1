<!DOCTYPE html>
<html>
<head>
  <title>Restaurant List</title>
</head>

<body>

<h2>Add Restaurant</h2>

<input type="text" id="name" placeholder="Restaurant Name">
<input type="text" id="cuisine" placeholder="Cuisine">
<input type="number" id="rating" placeholder="Rating">
<button onclick="addRestaurant()">Add</button>

<h3>Restaurant List</h3>
<div id="list"></div>

<script>
  let restaurants = [];

  function addRestaurant() {
    const name = document.getElementById("name").value;
    const cuisine = document.getElementById("cuisine").value;
    const rating = document.getElementById("rating").value;

    restaurants.push({ name, cuisine, rating });

    renderList();

    document.getElementById("name").value = "";
    document.getElementById("cuisine").value = "";
    document.getElementById("rating").value = "";
  }

  function renderList() {
    const list = document.getElementById("list");
    list.innerHTML = "";

    restaurants.forEach((item, index) => {
      list.innerHTML += `
        <div>
          <p><b>${item.name}</b> - ${item.cuisine} - ⭐ ${item.rating}</p>
          <button onclick="deleteRestaurant(${index})">Delete</button>
        </div>
      `;
    });
  }

  // ✅ DELETE FEATURE USING SPLICE
  function deleteRestaurant(index) {
    restaurants.splice(index, 1);  // remove from array
    renderList();                  // update UI instantly
  }
</script>

</body>
</html>
