<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Console Error Stack Trace</title>
</head>
<body>

  <h2>💳 Payment Flow Debug Example</h2>
  <p>Open DevTools → Console to see error and stack trace</p>

  <button onclick="placeOrder()">Place Order</button>

  <script>
    function placeOrder() {
      console.log("📦 Placing order...");
      confirmOrder();
    }

    function confirmOrder() {
      console.log("✅ Confirming order...");
      processPayment();
    }

    function processPayment() {
      console.log("💰 Processing payment...");

      // ❌ Error intentionally thrown
      throw new Error("Payment failed");
    }
  </script>

</body>
</html>
