<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Songs Console Table</title>
</head>
<body>

  <h2>🎵 Open Console to see Songs Table</h2>

  <script>
    // Array of 5 songs
    const songs = [
      { title: "Blinding Lights", artist: "The Weeknd", duration: "3:20" },
      { title: "Shape of You", artist: "Ed Sheeran", duration: "4:24" },
      { title: "Levitating", artist: "Dua Lipa", duration: "3:23" },
      { title: "Believer", artist: "Imagine Dragons", duration: "3:37" },
      { title: "Senorita", artist: "Shawn Mendes & Camila Cabello", duration: "3:11" }
    ];

    // Display table in console
    console.table(songs);
  </script>

</body>
</html>
