<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Student Registration Form</h1>
    <form action="post">
        <table>
            <tr>
                <th>Roll no:</th>
                <td><input type="text" name="" id=""></td>
            </tr>
            <tr>
                <th>Student Name:</th>
                <td><input type="text" name="" id="" placeholder="First Name"> -
                    <input type="text" name="" id="" placeholder="Last Name"></td>
            </tr>
            <tr>
                <th>Father Name:</th>
                <td><input type="text" name="" id=""></td>
            </tr>
            <tr>
                <th>Date of Birth:</th>
                <td><input type="text" name="" id="" placeholder="Day">
                 - <input type="text" name="" id="" placeholder="Month" > - 
                    <input type="text" name="" id="" placeholder="Year">(DD-MM-YYYY)
                </td>
            </tr>
            <tr>
                <th>Moblie No:</th>
                <td><input type="text" value="+91" readonly> - 
                <input type="text" name="" id=""></td>
            </tr>
            <tr>
                <th>Email Id:</th>
                <td><input type="text" name="" id=""></td>
            </tr>
            <tr>
                <th>Password:</th>
                <td><input type="text" name="" id=""></td>
            </tr>
            <tr>
                <th>Gender:</th>
                <td><input type="radio" name="gen" id="">Male
                <input type="radio" name="gen" id="">Female</td>
                
            </tr>
            <tr>
                <th>Department:</th>
                <td><input type="checkbox" name="" id="">CBSC
                <input type="checkbox" name="" id="">IT
                <input type="checkbox" name="" id="">ECE
                <input type="checkbox" name="" id="">Civil
                <input type="checkbox" name="" id="">Mech
                </td>
            </tr>
            <tr>
                <th>Course:</th>
                <td><select name="" id="" >
                    <option value=""  selected> -----Select Current Course-----
                    </option>
                    <option value="">Python</option>
                    <option value="">PHP</option>
                    <option value="">JAVA</option>
                    <option value="">Android</option>
                </select></td>
            </tr>
            <tr>
                <th>Student photo:</th>
                <td><input type="file" name="" id=""></td>
            </tr>
            <tr>
                <th>City:</th>
                <td><input type="text" name="" id=""></td>
            </tr>
            <tr>
                <th>Address:</th>
                <td><textarea name="" id=""></textarea></td>
            </tr>
            <tr>
                <td><button type="submit">Register</button></td>
            </tr>
        </table>
    </form>

</body>
</html>
