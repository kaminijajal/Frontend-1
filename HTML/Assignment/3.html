<!DOCTYPE html>
<html>
<head>
    <title>Product Catalog</title>
</head>
<body>

<h2 style="text-align:center;">Product Catalog</h2>

<table style="width:90%; margin:auto; border-collapse:collapse; font-family:Arial;">
    
    <!-- Table Header -->
    <thead>
        <tr style="background-color:#f2f2f2;">
            <th style="border:1px solid #000; padding:10px;">Product Name</th>
            <th style="border:1px solid #000; padding:10px;">Product Image</th>
            <th style="border:1px solid #000; padding:10px;">Price</th>
            <th style="border:1px solid #000; padding:10px;">Description</th>
            <th style="border:1px solid #000; padding:10px;">Availability</th>
        </tr>
    </thead>

    <!-- Table Body -->
    <tbody>
        <tr>
            <td style="border:1px solid #000; padding:10px;">Laptop</td>
            <td style="border:1px solid #000; padding:10px; text-align:center;">
                <img src="img/1.jpg" alt="Laptop">
            </td>
            <td style="border:1px solid #000; padding:10px;">₹55,000</td>
            <td style="border:1px solid #000; padding:10px;">
                High performance laptop for work and study
            </td>
            <td style="border:1px solid #000; padding:10px; color:green;">
                In Stock
            </td>
        </tr>

        <tr>
            <td style="border:1px solid #000; padding:10px;">Smartphone</td>
            <td style="border:1px solid #000; padding:10px; text-align:center;">
                <img src="img/2.jpg" alt="Phone">
            </td>
            <td style="border:1px solid #000; padding:10px;">₹18,000</td>
            <td style="border:1px solid #000; padding:10px;">
                Android smartphone with dual camera
            </td>
            <td style="border:1px solid #000; padding:10px; color:red;">
                Out of Stock
            </td>
        </tr>

        <!-- Merged row using colspan -->
        <tr>
            <td colspan="5" style="border:1px solid #000; padding:12px; text-align:center; background:#e8f4ff;">
                Special Offer: Free delivery on all **In Stock** products!
            </td>
        </tr>
    </tbody>

</table>

</body>
</html>
